apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-analytics-dashboard
  labels:
    app: customer-analytics-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-analytics-dashboard
  template:
    metadata:
      labels:
        app: customer-analytics-dashboard
    spec:
      containers:
      - name: dashboard
        image: customer-analytics-dashboard:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
